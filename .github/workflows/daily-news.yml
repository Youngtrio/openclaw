name: Daily India Market News

on:
  schedule:
    - cron: '30 2 * * *' # 인도 시간 오전 8시
  workflow_dispatch:      # 이 줄이 있어야 'Run workflow' 버튼이 생깁니다!

jobs:
  collect-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python news_collector.py
