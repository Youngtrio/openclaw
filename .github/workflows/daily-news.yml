name: Daily India Market News

on:
  schedule:
    - cron: '30 2 * * *' # 인도 시간 오전 8시
  workflow_dispatch:

jobs:
  collect-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.11' # 더 안정적인 파이썬 버전 사용

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python news_collector.py
